<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>AbilityChain Explorer – Quadruplex</title>

    <style>
        body {
            margin: 0;
            background: #000;
            color: #FFD700;
            font-family: system-ui, sans-serif;
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #FFD700;
        }

        #explorer {
            width: 90%;
            margin: 20px auto;
        }

        .block {
            border: 1px solid #FFD700;
            padding: 10px;
            margin-bottom: 10px;
            background: #111;
            border-radius: 6px;
        }

        .block h3 {
            margin: 0 0 10px 0;
        }

        .quadruplex-box {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #FFD700;
            background: #111;
            border-radius: 6px;
        }

        #orbit-grid {
            margin: 20px auto;
            width: 180px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 4px;
        }

        .orbit-cell {
            width: 60px;
            height: 60px;
            background: #111;
            border: 1px solid #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            text-align: center;
            padding: 4px;
            word-break: break-all;
        }

        .actions {
            text-align: center;
            margin-top: 30px;
        }

        .actions button {
            background: #0055FF;
            color: #FFD700;
            border: none;
            padding: 10px 16px;
            margin: 6px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>

<body>

<header>
    <h1>AbilityChain Explorer</h1>
    <p>Quadruplex‑System · Block‑Orbit‑Analyse</p>
</header>

<div id="explorer">

    <div class="quadruplex-box">
        <h3>Quadruplex Orbit (Block‑Analyse)</h3>
        <div id="orbit-grid"></div>
    </div>

    <div class="actions">
        <button id="btn-wallet">Wallet</button>

        <!-- Auth‑System integriert -->
        <button id="btn-settings" data-auth="settings">Settings</button>

        <button id="btn-root">Home</button>
    </div>

</div>

<script type="module">
    import { initAuthUI } from "../../global/auth.js";
    import { buildOrbitSignature } from "../../global/quadruplex-engine.js";

    initAuthUI();

    function renderOrbit() {
        const grid = document.getElementById("orbit-grid");
        grid.innerHTML = "";

        const orbit = buildOrbitSignature(
            1,
            0,
            { x: 0, y: 0 }
        );

        orbit.forEach(hash => {
            const cell = document.createElement("div");
            cell.className = "orbit-cell";
            cell.textContent = hash;
            grid.appendChild(cell);
        });
    }

    renderOrbit();

    document.getElementById("btn-wallet").onclick = () => {
        window.location.href = "../../wallet/index.html";
    };

    document.getElementById("btn-settings").onclick = () => {
        window.location.href = "../../settings/index.html";
    };

    document.getElementById("btn-root").onclick = () => {
        window.location.href = "../../index.html";
    };
</script>

</body>
</html>
