name: PRAI-Runtime-Genesis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  prai-runtime:
    runs-on: [ubuntu-latest, rfof-network, prai]

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Runtime Kernel (Axiom Mode)
        run: |
          echo "PRAI / RFOF-NETWORK Kernel gestartet"
          echo "Axiomatische 0ms-Fraktalprüfung wird in runtime.js ausgeführt"
          node runtime.js

      - name: Start JSON-RPC Node
        run: node start.js

      - name: Linked Hash Fractal Validation
        run: node linked-hash.js

      - name: Auto-Merge Pull Request
        if: github.event_name == 'pull_request'
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
